
<div id="navbar-placeholder"></div>

<div class="container py-5 mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h1 class="display-5 fw-bold mb-1">
        <i class="bi bi-shield-lock text-primary me-2"></i>Admin Panel
      </h1>
      <p class="text-muted">Manage users and documents across the platform.</p>
    </div>
  </div>

  <!-- Stats Cards -->
  <div class="row g-3 mb-4" id="adminStats">
    <div class="col-md-4">
      <div class="card border-0 shadow-sm">
        <div class="card-body d-flex align-items-center gap-3">
          <div class="rounded-circle bg-primary bg-opacity-10 d-flex align-items-center justify-content-center" style="width:48px;height:48px">
            <i class="bi bi-people-fill text-primary fs-5"></i>
          </div>
          <div>
            <div class="text-muted small">Total Users</div>
            <div class="fw-bold fs-5" id="statUsers">–</div>
          </div>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card border-0 shadow-sm">
        <div class="card-body d-flex align-items-center gap-3">
          <div class="rounded-circle bg-success bg-opacity-10 d-flex align-items-center justify-content-center" style="width:48px;height:48px">
            <i class="bi bi-file-earmark-text-fill text-success fs-5"></i>
          </div>
          <div>
            <div class="text-muted small">Total Documents</div>
            <div class="fw-bold fs-5" id="statDocs">–</div>
          </div>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card border-0 shadow-sm">
        <div class="card-body d-flex align-items-center gap-3">
          <div class="rounded-circle bg-warning bg-opacity-10 d-flex align-items-center justify-content-center" style="width:48px;height:48px">
            <i class="bi bi-person-fill-lock text-warning fs-5"></i>
          </div>
          <div>
            <div class="text-muted small">Admins</div>
            <div class="fw-bold fs-5" id="statAdmins">–</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <ul class="nav nav-tabs mb-4" id="adminTabs" role="tablist">
    <li class="nav-item" role="presentation">
      <button class="nav-link active" id="users-tab" data-bs-toggle="tab" data-bs-target="#usersPane" type="button" role="tab" aria-controls="usersPane" aria-selected="true">
        <i class="bi bi-people me-1"></i>Users
      </button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="documents-tab" data-bs-toggle="tab" data-bs-target="#documentsPane" type="button" role="tab" aria-controls="documentsPane" aria-selected="false">
        <i class="bi bi-file-earmark-text me-1"></i>Documents
      </button>
    </li>
  </ul>

  <div class="tab-content">
    <!-- Users Tab -->
    <div class="tab-pane fade show active" id="usersPane" role="tabpanel" aria-labelledby="users-tab">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Role</th>
                  <th>Status</th>
                  <th>Joined</th>
                  <th class="text-end">Actions</th>
                </tr>
              </thead>
              <tbody id="usersTableBody">
                <tr>
                  <td colspan="6" class="text-center py-4">
                    <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                    <span class="ms-2 text-muted">Loading users...</span>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Documents Tab -->
    <div class="tab-pane fade" id="documentsPane" role="tabpanel" aria-labelledby="documents-tab">
      <div class="mb-3">
        <input type="text" class="form-control" id="docSearchInput" placeholder="Search documents by title, owner, or category...">
      </div>
      <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Title</th>
                  <th>Owner</th>
                  <th>Category</th>
                  <th>Created</th>
                  <th class="text-end">Actions</th>
                </tr>
              </thead>
              <tbody id="documentsTableBody">
                <tr>
                  <td colspan="5" class="text-center py-4">
                    <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                    <span class="ms-2 text-muted">Loading documents...</span>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Delete Document Confirm Modal -->
<div class="modal fade" id="adminDeleteModal" tabindex="-1" aria-labelledby="adminDeleteModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-0">
        <h5 class="modal-title" id="adminDeleteModalLabel">Confirm Delete</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        Are you sure you want to delete "<span id="adminDeleteDocTitle"></span>"? This action cannot be undone.
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-danger" id="adminDeleteConfirmBtn">Delete</button>
      </div>
    </div>
  </div>
</div>
